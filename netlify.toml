# Netlify configuration for Next.js deployment with native plugin support

[build]
command = "pnpm build"

[build.environment]
NODE_VERSION = "20"

# Use Netlify's official Next.js plugin for proper SSR and dynamic route handling
[[plugins]]
package = "@netlify/plugin-nextjs"

# Cache headers for static assets
[[headers]]
for = "/_next/static/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

# Security headers
[[headers]]
for = "/*"
[headers.values]
X-Content-Type-Options = "nosniff"
X-Frame-Options = "SAMEORIGIN"
X-XSS-Protection = "1; mode=block"
Referrer-Policy = "strict-origin-when-cross-origin"
