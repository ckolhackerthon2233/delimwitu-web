# Netlify configuration for Next.js deployment

[build]
command = "pnpm build"
publish = ".next"
environment = { NODE_VERSION = "20" }

# Environment variables can be set in Netlify dashboard or here:
# [build.environment]
# NEXT_PUBLIC_API_URL = "your-api-url"

# Redirect all non-file requests to Next.js for client-side routing
[[redirects]]
from = "/*"
to = "/index.html"
status = 200
conditions = { Role = "visitorNotFile" }

# Cache headers for static content
[[headers]]
for = "/static/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/_next/static/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

# Security headers
[[headers]]
for = "/*"
[headers.values]
X-Content-Type-Options = "nosniff"
X-Frame-Options = "SAMEORIGIN"
X-XSS-Protection = "1; mode=block"
Referrer-Policy = "strict-origin-when-cross-origin"
